apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-lab-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-lab
  template:
    metadata:
      labels:
        app: cloud-lab
    spec:
      containers:
      - name: cloud-lab
        image: cloud-lab:v1
        imagePullPolicy: Never        
        ports:
        - containerPort: 5000